
networks:
  backend:
    driver: bridge

services:
  # Central Caddy Gateway
  gateway:
    image: caddy:latest
    container_name: gateway
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP
      - "443:443"   # HTTPS  
    networks:
      - backend
    volumes:
      - ./gateway/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - write-service
      - read-service


  read-service:
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '5.0'
    working_dir: /app
    environment:
        - REQUEST_MAX_EXECUTION_TIME=0
        - SERVER_NAME=:8080
    build:
        context: ./services/read-service
        dockerfile: Dockerfile
    volumes:
        - ./services/read-service:/app
        - ./caddy/Caddyfile:/etc/caddy/Caddyfile
    ports:
        - 8080:8080
        - 8443:8443
    networks:
      - backend
    depends_on:
      - redis
      - postgres

  write-service:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    working_dir: /app
    environment:
        - REQUEST_MAX_EXECUTION_TIME=0
        - SERVER_NAME=:8080
    build:
        context: ./services/write-service
        dockerfile: Dockerfile
    volumes:
        - ./services/write-service:/app
        - ./caddy/Caddyfile:/etc/caddy/Caddyfile
    ports:
        - 8081:8080
        - 8444:8443
    networks:
      - backend
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: urls
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - backend
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config: